server:
  host: "127.0.0.1"
  port: 10101
  body_limit_mb: 50
  request_log_buffer: 1000
  enable_timing: false
  timing_csv_path: "server_request_timing.csv"

api:
  index_names:
    - "cluster-metrics"
    - "edge-metrics"
  enable_batch_endpoint: true
  enable_metrics_endpoint: true
  strict_mode: false
  default_batch_fields:
    - "cpu_cores"
    - "memory_gb"
    - "network_mbps"
  default_batch_percents:
    - 50.0

upstream:
  mode: "fallback"
  search_url_template: "http://localhost:9200/{index}/_search"
  forward_headers:
    - "x-request-id"
    - "x-request-type"

storage:
  backend: "in_memory_key_store"
  predefined_keys: [] # Optional list of predefined keys to initialize the store with.
  range_key_catalog: # Optional configuration for initializing store with keys based on a range pattern.
    format: "N{:03}"
    start: 1
    end: 30

indices:
  cluster-metrics:
    metrics:
      - name: "cpu_cores"
        aliases: ["cpucores", "cpu-cores"]
        storage_field: "cpu_cores"
      - name: "memory_gb"
        aliases: ["memorygb", "memory-gb"]
        storage_field: "memory_gb"
      - name: "network_mbps"
        aliases: ["networkmbps", "network-mbps"]
        storage_field: "network_mbps"
    key_fields:
      - "cluster"
    ingest_field_mapping:
      key_field: "cluster"
      epoch_field: "epoch"
      task_field: "task"
      metric_fields:
        cpu_cores: "cpu_cores"
        memory_gb: "memory_gb"
        network_mbps: "network_mbps"

  edge-metrics:
    metrics:
      - name: "cpu_cores"
        aliases: ["cpucores", "cpu-cores"]
        storage_field: "cpu_cores"
      - name: "memory_gb"
        aliases: ["memorygb", "memory-gb"]
        storage_field: "memory_gb"
      - name: "network_mbps"
        aliases: ["networkmbps", "network-mbps"]
        storage_field: "network_mbps"
    key_fields:
      - "edge"
    ingest_field_mapping:
      key_field: "edge"
      epoch_field: "epoch"
      task_field: "task"
      metric_fields:
        cpu_cores: "cpu_cores"
        memory_gb: "memory_gb"
        network_mbps: "network_mbps"
