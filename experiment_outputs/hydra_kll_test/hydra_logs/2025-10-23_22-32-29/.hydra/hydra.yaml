hydra:
  run:
    dir: ${local_experiment_dir:}/${experiment.name}/hydra_logs/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: ./multirun/${experiment.name}/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra:job.num}
  launcher:
    _target_: hydra._internal.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - experiment_type=hydrakll_test.yaml
    - cloudlab.num_nodes=2
    - cloudlab.username=yuanyc
    - cloudlab.hostname_suffix=HydraKllTesting2.softmeasure-PG0.wisc.cloudlab.us
    - experiment.name=hydra_kll_test
  job:
    name: experiment_run_e2e
    chdir: false
    override_dirname: cloudlab.hostname_suffix=HydraKllTesting2.softmeasure-PG0.wisc.cloudlab.us,cloudlab.num_nodes=2,cloudlab.username=yuanyc,experiment.name=hydra_kll_test,experiment_type=hydrakll_test.yaml
    id: ???
    num: ???
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /Users/yancheng/ProjectASAP/network-control-demo/Utilities/experiments
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /Users/yancheng/ProjectASAP/network-control-demo/Utilities/experiments/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /Users/yancheng/ProjectASAP/network-control-demo/experiment_outputs/hydra_kll_test/hydra_logs/2025-10-23_22-32-29
    choices:
      experiment_type: hydrakll_test.yaml
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
