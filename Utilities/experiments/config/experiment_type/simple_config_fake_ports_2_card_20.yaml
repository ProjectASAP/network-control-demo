# @package experiment_params
experiment:
  - mode: sketchdb
    query_prometheus_too: True
  #- mode: prometheus


servers:
- name: prometheus
  url: http://localhost:9090
- name: sketchdb
  url: http://localhost:8088

workloads:
  # deathstar:
  #   use: True

exporters:
  only_start_if_queries_exist: True
  exporter_list:
    node_exporter:
      port: 9100
      extra_flags: --collector.disable-defaults --collector.cpu
    fake_exporter:
      num_ports_per_server: 2 # number of exporter per server
      start_port: 50000
      dataset: zipf
      synthetic_data_value_scale: 10000 # [0, value_scale]
      num_labels: 3
      num_values_per_label: 20
      metric_type: counter # Metric name: "fake_metric" for gauge, "fake_metric_total" for counter

query_groups:
- id: 1
  queries:
  #- count_over_time(fake_metric_total[1m])
  - sum_over_time(fake_metric_total[1m])
  #- quantile_over_time(0.5, fake_metric_total[1m])
  #- quantile_over_time(0.95, fake_metric_total[1m])
  #- increase(fake_metric_total[10m])
  #- rate(fake_metric_total[10m])
  - sum by (instance, job) (count_over_time(fake_metric_total[1m]))
  - sum by (label_0) (count_over_time(fake_metric_total[1m]))
  repetition_delay: 10
  client_options:
    repetitions: 10
    # use this to account for freshness delay
    query_time_offset: 10
  # TODO: automatically determine starting_delay from query_time_offset + max(T_lookback)
    starting_delay: 70
  controller_options:
    accuracy_sla: 0.99
    latency_sla: 1

metrics:
  - metric: "fake_metric_total"
    labels: ['instance', 'job', 'label_0', 'label_1', 'label_2'] #, 'label_3', 'label_4']
    exporter: fake_exporter
