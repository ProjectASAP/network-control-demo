# @package experiment_params
# Vertical Scalability Testing Configuration
# Tests Prometheus and VictoriaMetrics performance with Docker resource constraints

experiment:
  - mode: sketchdb
    query_prometheus_too: true
  #- mode: prometheus

# Docker resource constraints for vertical scalability testing
#docker_resources:
#  cpu_limit: 2.0           # vCPUs to allocate (e.g., 1.0, 2.0, 4.0, 8.0)
#  memory_limit: 2g         # Memory limit (e.g., 1g, 2g, 4g, 8g)
#  tool: prometheus         # prometheus | victoriametrics

# Server configurations - URLs will be auto-selected based on tool
servers:
- name: prometheus
  url: http://localhost:9090    # Used when tool=prometheus
#- name: victoriametrics
#  url: http://localhost:8428    # Used when tool=victoriametrics
- name: sketchdb
  url: http://localhost:8088

exporters:
  only_start_if_queries_exist: True
  exporter_list:
    node_exporter:
      port: 9100
      extra_flags: --collector.disable-defaults --collector.cpu
    fake_exporter:
      num_ports_per_server: 5 # number of exporter per server
      start_port: 50000
      dataset: zipf
      synthetic_data_value_scale: 1000 # [0, value_scale]
      num_labels: 1
      num_values_per_label: 20
      metric_type: counter # Metric name: "fake_metric" for gauge, "fake_metric_total" for counter

query_groups:
- id: 1
  queries:
    #- sum by (instance, job) (count_over_time(fake_metric_total[10m]))
    #- sum by (instance, job) (sum_over_time(fake_metric_total[10m]))
    #- sum by (label_0) (count_over_time(fake_metric_total[10m]))
    #- sum by (label_0) (sum_over_time(fake_metric_total[10m]))
    #- quantile by (instance, job) (0.99, fake_metric_total)
    #- quantile by (instance, job) (0.95, fake_metric_total)
    #- quantile by (instance, job) (0.90, fake_metric_total)
    #- quantile by (label_0) (0.99, fake_metric_total)
    #- quantile by (label_0) (0.95, fake_metric_total)
    #- quantile by (label_0) (0.90, fake_metric_total)
    #- quantile_over_time(0.95, fake_metric_total[5m])
    #- count_over_time(fake_metric_total[1m])
    - rate(fake_metric_total[1m])
    - increase(fake_metric_total[1m])
  repetition_delay: 10          # Seconds between query executions (frequency)
  client_options:
    repetitions: 10             # Number of query repetitions (determines test duration)
    query_time_offset: 10       # Account for data freshness delay
    starting_delay: 70          # Wait time before starting queries (let metrics accumulate)

  controller_options:
    accuracy_sla: 0.99
    latency_sla: 1

metrics:
  - metric: "fake_metric_total"
    #labels: ['instance', 'job', 'label_0', 'label_1', 'label_2']
    labels: ['instance', 'job', 'label_0'] #, 'label_1', 'label_2']
    exporter: fake_exporter
