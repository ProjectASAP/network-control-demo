# @package experiment_params
# Config file for workshop demo experiment type

experiment:
  - mode: sketchdb
    query_prometheus_too: true

servers:
- name: prometheus
  url: http://localhost:9090
- name: sketchdb
  url: http://localhost:8088

exporters:
  only_start_if_queries_exist: True
  exporter_list:
    node_exporter:
      port: 9100
      extra_flags: --collector.disable-defaults --collector.cpu
    fake_exporter:
      num_ports_per_server: 1
      start_port: 50000
      dataset: zipf
      synthetic_data_value_scale: 10000
      num_labels: 3
      num_values_per_label: 20
      metric_type: counter

query_groups:
- id: 1
  queries:

    - quantile_over_time(0.5, cpu_usage[150s])

    - quantile_over_time(0.5, cpu_usage[20m])

    - quantile_over_time(0.9, cpu_usage[150s])

    - quantile_over_time(0.9, cpu_usage[20m])

    - quantile_over_time(0.95, cpu_usage[150s])

    - quantile_over_time(0.95, cpu_usage[20m])

    - avg_over_time(cpu_usage[150s])

    - avg_over_time(cpu_usage[20m])

    - quantile_over_time(0.5, cpu_usage_task_id[150s])

    - quantile_over_time(0.5, cpu_usage_task_id[20m])

    - quantile_over_time(0.9, cpu_usage_task_id[150s])

    - quantile_over_time(0.9, cpu_usage_task_id[20m])

    - quantile_over_time(0.95, cpu_usage_task_id[150s])

    - quantile_over_time(0.95, cpu_usage_task_id[20m])

    - avg_over_time(cpu_usage_task_id[150s])

    - avg_over_time(cpu_usage_task_id[20m])

    - quantile_over_time(0.5, cpu_usage_node_id[150s])

    - quantile_over_time(0.5, cpu_usage_node_id[20m])

    - quantile_over_time(0.9, cpu_usage_node_id[150s])

    - quantile_over_time(0.9, cpu_usage_node_id[20m])

    - quantile_over_time(0.95, cpu_usage_node_id[150s])

    - quantile_over_time(0.95, cpu_usage_node_id[20m])

    - avg_over_time(cpu_usage_node_id[150s])

    - avg_over_time(cpu_usage_node_id[20m])

    - quantile_over_time(0.5, memory_usage[150s])

    - quantile_over_time(0.5, memory_usage[20m])

    - quantile_over_time(0.9, memory_usage[150s])

    - quantile_over_time(0.9, memory_usage[20m])

    - quantile_over_time(0.95, memory_usage[150s])

    - quantile_over_time(0.95, memory_usage[20m])

    - avg_over_time(memory_usage[150s])

    - avg_over_time(memory_usage[20m])

    - quantile_over_time(0.5, memory_usage_task_id[150s])

    - quantile_over_time(0.5, memory_usage_task_id[20m])

    - quantile_over_time(0.9, memory_usage_task_id[150s])

    - quantile_over_time(0.9, memory_usage_task_id[20m])

    - quantile_over_time(0.95, memory_usage_task_id[150s])

    - quantile_over_time(0.95, memory_usage_task_id[20m])

    - avg_over_time(memory_usage_task_id[150s])

    - avg_over_time(memory_usage_task_id[20m])

    - quantile_over_time(0.5, memory_usage_node_id[150s])

    - quantile_over_time(0.5, memory_usage_node_id[20m])

    - quantile_over_time(0.9, memory_usage_node_id[150s])

    - quantile_over_time(0.9, memory_usage_node_id[20m])

    - quantile_over_time(0.95, memory_usage_node_id[150s])

    - quantile_over_time(0.95, memory_usage_node_id[20m])

    - avg_over_time(memory_usage_node_id[150s])

    - avg_over_time(memory_usage_node_id[20m])

    - quantile_over_time(0.5, available_bandwidth_usage[150s])

    - quantile_over_time(0.5, available_bandwidth_usage[20m])

    - quantile_over_time(0.9, available_bandwidth_usage[150s])

    - quantile_over_time(0.9, available_bandwidth_usage[20m])

    - quantile_over_time(0.95, available_bandwidth_usage[150s])

    - quantile_over_time(0.95, available_bandwidth_usage[20m])

    - avg_over_time(available_bandwidth_usage[150s])

    - avg_over_time(available_bandwidth_usage[20m])

    - quantile_over_time(0.5, available_bandwidth_usage_source_task_id[150s])

    - quantile_over_time(0.5, available_bandwidth_usage_source_task_id[20m])

    - quantile_over_time(0.9, available_bandwidth_usage_source_task_id[150s])

    - quantile_over_time(0.9, available_bandwidth_usage_source_task_id[20m])

    - quantile_over_time(0.95, available_bandwidth_usage_source_task_id[150s])

    - quantile_over_time(0.95, available_bandwidth_usage_source_task_id[20m])

    - avg_over_time(available_bandwidth_usage_source_task_id[150s])

    - avg_over_time(available_bandwidth_usage_source_task_id[20m])

    - quantile_over_time(0.5, available_bandwidth_usage_target_task_id[150s])

    - quantile_over_time(0.5, available_bandwidth_usage_target_task_id[20m])

    - quantile_over_time(0.9, available_bandwidth_usage_target_task_id[150s])

    - quantile_over_time(0.9, available_bandwidth_usage_target_task_id[20m])

    - quantile_over_time(0.95, available_bandwidth_usage_target_task_id[150s])

    - quantile_over_time(0.95, available_bandwidth_usage_target_task_id[20m])

    - avg_over_time(available_bandwidth_usage_target_task_id[150s])

    - avg_over_time(available_bandwidth_usage_target_task_id[20m])


  repetition_delay: 240
  client_options:
    repetitions: 10
    query_time_offset: 10
    starting_delay: 610

  controller_options:
    accuracy_sla: 0.99
    latency_sla: 1

metrics:

  - metric: "cpu_usage"
    labels: ['task_id', 'node_id']
    exporter: fake_exporter

  - metric: "cpu_usage_task_id"
    labels: ['node_id']
    exporter: fake_exporter

  - metric: "cpu_usage_node_id"
    labels: ['task_id']
    exporter: fake_exporter

  - metric: "memory_usage"
    labels: ['task_id', 'node_id']
    exporter: fake_exporter

  - metric: "memory_usage_task_id"
    labels: ['node_id']
    exporter: fake_exporter

  - metric: "memory_usage_node_id"
    labels: ['task_id']
    exporter: fake_exporter

  - metric: "available_bandwidth_usage"
    labels: ['source_task_id', 'target_task_id']
    exporter: fake_exporter

  - metric: "available_bandwidth_usage_source_task_id"
    labels: ['target_task_id']
    exporter: fake_exporter

  - metric: "available_bandwidth_usage_target_task_id"
    labels: ['source_task_id']
    exporter: fake_exporter
