metrics:
  - metric: cpu_usage
    labels: 
      - task_id
      - node_id
    entities: 
      - none
      - task_id
      - node_id
  - metric: memory_usage
    labels: 
      - task_id
      - node_id
    entities: 
      - none
      - task_id
      - node_id
  - metric: available_bandwidth_usage
    labels: 
      - source_task_id
      - target_task_id
    entities: 
      - none
      - source_task_id
      - target_task_id

statistics:
  - median
  - p90
  - p95
  - average

time_windows:
  - K_of_measurement_epochs: 5
  - K_of_control_epochs: 5

epochs:
  measurement_epoch: 30s
  control_epoch: 4m 
