metrics:
  - metric: cpu_usage
    entities: 
      - task_id
      - node_id
  - metric: mem_usage
    entities: 
      - task_id
      - node_id
  - metric: bandwidth_usage
    entities: 
      - source_task_id
      - target_task_id

statistics:
  - median
  - p90
  - p95
  - average

time_windows:
  - K_of_measurement_epochs: 5
  - K_of_control_epochs: 5

epochs:
  measurement_epoch: 5m
  control_epoch: 30s
