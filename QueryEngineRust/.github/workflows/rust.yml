name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  format-and-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: QueryEngineRust

    - uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/CommonDependencies
        token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        path: CommonDependencies

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Run sccache-cache
      uses: mozilla-actions/sccache-action@v0.0.4

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          QueryEngineRust/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Check formatting
      run: cargo fmt -- --check
      working-directory: QueryEngineRust

    - name: Run clippy
      run: cargo clippy -- -D warnings
      working-directory: QueryEngineRust
      env:
        RUSTC_WRAPPER: sccache

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: QueryEngineRust

    - uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/CommonDependencies
        token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        path: CommonDependencies

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Run sccache-cache
      uses: mozilla-actions/sccache-action@v0.0.4

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          QueryEngineRust/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Run tests
      run: cargo test
      working-directory: QueryEngineRust
      env:
        RUSTC_WRAPPER: sccache

  docker:
    runs-on: ubuntu-latest
    needs: [format-and-lint, test]
    steps:
    - uses: actions/checkout@v4
      with:
        path: QueryEngineRust

    - uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/CommonDependencies
        token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        path: CommonDependencies

    - name: Build Docker image
      run: docker build -f QueryEngineRust/Dockerfile -t sketchdb-queryengine-rust:latest .
